name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-test-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .
      - name: Mypy (non-blocking)
        run: mypy app || true
      - name: Bandit (security)
        run: bandit -r app -ll
      - name: Semgrep (OWASP/SAST)
        run: semgrep --config=p/python --config=p/owasp-top-ten --error app
      - name: pip-audit (deps)
        # pyjwt 2.12.1 advisories (PYSEC-2026-175/177/178/179), pulled in transitively
        # by semgrep which pins pyjwt~=2.12.0 — so we cannot upgrade. Dev-tooling only,
        # NOT shipped in the app. Remove these ignores once semgrep relaxes its pyjwt pin.
        run: >-
          pip-audit -r requirements-dev.txt
          --ignore-vuln PYSEC-2026-175
          --ignore-vuln PYSEC-2026-177
          --ignore-vuln PYSEC-2026-178
          --ignore-vuln PYSEC-2026-179
      - name: Pytest (non-gui)
        run: pytest -m "not gui" -v

  gui-test-windows:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Pytest (full incl. gui)
        run: pytest -v
